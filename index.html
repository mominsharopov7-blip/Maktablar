<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sariosiyo Maktablari Masofa Hisoblagichi</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 550px;
            width: 100%;
        }
        h2 {
            color: #1e293b;
            margin-top: 0;
            text-align: center;
            font-size: 24px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 15px;
        }
        label {
            font-weight: 600;
            color: #475569;
            display: block;
            margin-bottom: 8px;
            margin-top: 20px;
        }
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            font-size: 16px;
            color: #334155;
            background-color: #fff;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }
        select:focus {
            border-color: #3b82f6;
        }
        .result-box {
            margin-top: 25px;
        }
        .selected-school-title {
            font-size: 18px;
            font-weight: bold;
            color: #2563eb;
            margin-bottom: 15px;
            background: #eff6ff;
            padding: 10px;
            border-radius: 6px;
            border-left: 4px solid #2563eb;
        }
        .school-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 12px 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .school-info b {
            color: #1e293b;
            display: block;
        }
        .school-info span {
            font-size: 13px;
            color: #64748b;
        }
        .distance-badge {
            background: #10b981;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Sariosiyo Maktablar Masofa Tizimi</h2>
    
    <label for="schoolSelect">Maktabni tanlang:</label>
    <select id="schoolSelect" onchange="calculateDistances()">
        <option value="">-- Tanlang --</option>
        <!-- Maktablar ro'yxati shu yerga chiqadi -->
    </select>

    <div class="result-box" id="resultBox" style="display: none;">
        <div class="selected-school-title" id="selectedTitle"></div>
        <div id="nearestList"></div>
    </div>
</div>

<script>
    // Sariosiyo maktablari bazasi (Namuna sifatida Dashnobod va markaz kiritilgan)
    // Keyinchalik qolgan barcha 94 ta maktabni xuddi shu tartibda kiritish mumkin
    const schools = [
        { id: 19, name: "19-sonli maktab", region: "Dashnobod", lat: 38.12456, lng: 67.89512 },
        { id: 34, name: "34-sonli maktab", region: "Dashnobod", lat: 38.13120, lng: 67.89945 },
        { id: 54, name: "54-sonli maktab", region: "Dashnobod", lat: 38.11890, lng: 67.88210 },
        { id: 1, name: "1-sonli maktab", region: "Sariosiyo Markazi", lat: 38.04215, lng: 67.92841 },
        { id: 10, name: "10-sonli maktab", region: "Sharg'un", lat: 38.15420, lng: 67.96110 }
    ];

    // Select menyuni to'ldirish
    const select = document.getElementById('schoolSelect');
    schools.forEach(school => {
        let opt = document.createElement('option');
        opt.value = school.id;
        opt.innerHTML = `${school.id}-maktab (${school.region})`;
        select.appendChild(opt);
    });

    // Masofani o'lchash (Haversine formulasi)
    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371; // Yer radiusi (km)
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * 
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    function calculateDistances() {
        const selectValue = document.getElementById('schoolSelect').value;
        const resultBox = document.getElementById('resultBox');
        const selectedTitle = document.getElementById('selectedTitle');
        const nearestList = document.getElementById('nearestList');

        if (!selectValue) {
            resultBox.style.display = 'none';
            return;
        }

        const selectedSchool = schools.find(s => s.id == selectValue);
        selectedTitle.innerHTML = `Tanlangan: ${selectedSchool.name} (${selectedSchool.region})`;

        let calculated = schools
            .filter(s => s.id !== selectedSchool.id)
            .map(s => {
                let dist = getDistance(selectedSchool.lat, selectedSchool.lng, s.lat, s.lng);
                return { ...s, distance: dist };
            })
            .sort((a, b) => a.distance - b.distance);

        nearestList.innerHTML = '';
        calculated.forEach(s => {
            let distanceStr = s.distance < 1 
                ? `${(s.distance * 1000).toFixed(0)} metr` 
                : `${s.distance.toFixed(2)} km`;

            nearestList.innerHTML += `
                <div class="school-card">
                    <div class="school-info">
                        <b>${s.name}</b>
                        <span>Hudud: ${s.region}</span>
                    </div>
                    <div class="distance-badge">${distanceStr}</div>
                </div>
            `;
        });

        resultBox.style.display = 'block';
    }
</script>

</body>
</html>
