<!DOCTYPE html>
<html lang="uz" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sariosiyo Maktablari Masofa Tizimi</title>
</head>
<body style="font-family:'Segoe UI', sans-serif; background-color:#edf2f7; margin:0; padding:10px; display:flex; justify-content:center; align-items:start; min-height:100vh;">

<div style="background:white; border-radius:15px; box-shadow:0 8px 30px rgba(0,0,0,0.1); max-width:500px; width:100%; overflow:hidden; border:2px solid #3c1e70; margin-top:15px; margin-bottom:15px;">
    
    <div style="background:#e8def8; padding:15px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #dcd1f3;">
        <div style="text-align:center; min-width:60px;">
            <div style="font-size:35px; margin-bottom:2px;">🇺🇿</div>
            <div style="font-size:10px; font-weight:bold; color:#1b5e20; letter-spacing:0.5px;">SARIOSIYO</div>
        </div>
        <div style="text-align:center; flex-grow:1; margin:0 10px;">
            <h2 style="color:#2c3e50; margin:0; font-size:15px; font-weight:700; line-height:1.3;">SARIOSIYO TUMANI MAKTABLAR MARENDA TIZIMI</h2>
            <div style="font-size:11px; color:#555; margin-top:3px; font-weight:500;">O'zbekiston Republic</div>
            <div style="color:#3c1e70; font-size:13px; font-family:'Brush Script MT', cursive; font-weight:bold; margin-top:4px;">Kelajak Markazlari</div>
        </div>
        <div style="text-align:center; min-width:60px;">
            <div style="font-size:35px; margin-bottom:2px;">🏫</div>
            <div style="font-size:10px; font-weight:bold; color:#e65100; letter-spacing:0.5px;">94 MAKTAB</div>
        </div>
    </div>

    <div style="background-color:#fff9c4; padding:20px; text-align:center; border-bottom:1px solid #fff59d; position:relative;">
        <div style="font-size:75px; margin-bottom:5px;">🏢</div>
        <div style="font-size:14px; font-weight:700; color:#2c3e50; letter-spacing:0.5px;">Boshqaruv Paneli</div>
        
        <div style="margin-top:12px;">
            <div style="color:#3c1e70; font-size:26px; font-family:'Brush Script MT', cursive; font-weight:bold; margin-bottom:0;">Kelajak</div>
            <div style="color:#555; font-size:9px; font-weight:bold; letter-spacing:1.5px; margin-top:-6px;">MARKAZLARI</div>
        </div>
        
        <div style="position:absolute; bottom:12px; right:20px; font-size:22px; opacity:0.8;">📍</div>
        <div style="position:absolute; top:15px; left:20px; font-size:18px; opacity:0.6;">🗺️</div>
    </div>

    <div style="padding:20px;">
        <div style="margin-bottom:20px;">
            <label style="font-weight:700; color:#34495e; display:block; margin-bottom:10px; font-size:15px;">Ro'yxatdan maktabni tanlang:</label>
            <select id="schoolSelect" onchange="calculateDistances()" style="width:100%; padding:14px; border:2px solid #3c1e70; border-radius:10px; font-size:15px; color:#2c3e50; background-color:#fff; cursor:pointer; outline:none; font-weight:500; box-sizing:border-box;">
                <option value="">-- Ro'yxatdan tanlang (94 ta maktab) --</option>
            </select>
        </div>

        <div id="resultBox" style="display:none; margin-top:25px; border-top:1px solid #eee; padding-top:15px;">
            <div id="selectedTitle" style="font-size:15px; font-weight:bold; color:#3c1e70; margin-bottom:15px; background:#f0eafc; padding:12px; border-radius:8px; border-left:5px solid #3c1e70;"></div>
            <div id="nearestList"></div>
        </div>
    </div>

    <div style="background:#eceff1; padding:12px; text-align:center; font-size:11px; color:#666; border-top:1px solid #cfd8dc; font-weight:500;">
        © Sariosiyo Tumani Xalq Ta'limi Bo'limi | Hamkorlikda: Kelajak Markazlari
    </div>
</div>

<script>
    // 1 dan 94 gacha BO'LGAN BARCHA MAKTABLAR RO'YXATI
    const schools = [];
    for (let i = 1; i <= 94; i++) {
        let lat = 0.0, lng = 0.0, region = "Sariosiyo tumani";
        
        // Koordinatalarni aniq tekshirib to'g'riladik
        if (i === 1) { lat = 38.4179709; lng = 6
            67.9608830; region = "Sariosiyo Markazi"; }
        else if (i === 2) { lat = 38.4077351; lng = 67.9527384; region = "Sariosiyo Markazi"; }
        else if (i === 10) { lat = 38.15420; lng = 67.96110; region = "Sharg'un shahri"; }
        else if (i === 19) { lat = 38.12456; lng = 67.89512; region = "Dashnobod"; }
        else if (i === 34) { lat = 38.13120; lng = 67.89945; region = "Dashnobod"; }
        else if (i === 54) { lat = 38.11890; lng = 67.88210; region = "Dashnobod"; }
        
        schools.push({ id: i, name: i + "-sonli maktab", region: region, lat: lat, lng: lng });
    }

    // Select menyuni to'ldirish
    const select = document.getElementById('schoolSelect');
    schools.forEach(school => {
        let opt = document.createElement('option');
        opt.value = school.id;
        opt.innerHTML = `${school.id}-maktab (${school.region})`;
        select.appendChild(opt);
    });

    function getDistance(lat1, lon1, lat2, lon2) {
        if (lat1 === 0 || lat2 === 0 || lon1 === 0 || lon2 === 0) return null;
        const R = 6371; 
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    function calculateDistances() {
        const selectValue = document.getElementById('schoolSelect').value;
        const resultBox = document.getElementById('resultBox');
        const selectedTitle = document.getElementById('selectedTitle');
        const nearestList = document.getElementById('nearestList');

        if (!selectValue) {
            resultBox.style.display = 'none';
            return;
        }

        const selectedSchool = schools.find(s => s.id == selectValue);
        selectedTitle.innerHTML = `📍 Tanlangan bosh maktab: ${selectedSchool.name} (${selectedSchool.region})`;

        if (selectedSchool.lat === 0 || selectedSchool.lng === 0) {
            nearestList.innerHTML = '<div style="font-size:13px; color:#ef4444; font-style:italic; padding:15px; text-align:center; font-weight:500;">Ushbu maktabning aniq GPS koordinatalari tizimga kiritilmoqda. Masofani hisoblash uchun 1, 2, 10, 19, 34 yoki 54-maktablarni tanlab ko\'ring.</div>';
            resultBox.style.display = 'block';
            return;
        }

        let calculated = schools
            .filter(s => s.id !== selectedSchool.id && s.lat !== 0 && s.lng !== 0)
            .map(s => {
                let dist = getDistance(selectedSchool.lat, selectedSchool.lng, s.lat, s.lng);
                return { ...s, distance: dist };
            })
            .sort((a, b) => a.distance - b.distance);

        nearestList.innerHTML = '';

        if (calculated.length === 0) {
            nearestList.innerHTML = '<div style="font-size:13px; color:#7f8c8d; font-style:italic; padding:15px; text-align:center;">Solishtirish uchun boshqa koordinatali maktab topilmadi.</div>';
        } else {
            calculated.forEach(s => {
                let distanceStr = s.distance < 1 
                    ? `${(s.distance * 1000).toFixed(0)} metr` 
                    : `${s.distance.toFixed(2)} km`;

                nearestList.innerHTML += `
                    <div style="background:#f9f9f9; border:1px solid #e0e0e0; padding:12px 15px; margin-bottom:10px; border-radius:10px; display:flex; justify-content:space-between; align-items:center; border-left:4px solid #3c1e70;">
                        <div>
                            <b style="color:#2c3e50; display:block; font-size:14px;">🏫 ${s.name}</b>
                            <span style="font-size:12px; color:#7f8c8d;">Hudud: ${s.region}</span>
                        </div>
                        <div style="background:#3c1e70; color:white; padding:6px 12px; border-radius:20px; font-size:12px; font-weight:700; white-space:nowrap; box-shadow:0 2px 5px rgba(0,0,0,0.1);">${distanceStr}</div>
                    </div>
                `;
            });
        }
        resultBox.style.display = 'block';
    }
</script>

</body>
</html>
