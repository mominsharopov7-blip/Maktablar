<!DOCTYPE html>
<html lang="uz" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sariosiyo Maktablari Masofa Tizimi</title>
</head>
<body style="font-family:'Segoe UI', sans-serif; background-color:#e0f7fa; margin:0; padding:10px; display:flex; justify-content:center; align-items:start; min-height:100vh;">

<div style="background:white; border-radius:15px; box-shadow:0 8px 30px rgba(0,0,0,0.1); max-width:600px; width:100%; overflow:hidden; border:2px solid #00acc1; margin-top:20px;">
    
    <div style="background:#f1f8e9; padding:15px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #c5e1a5;">
        <div style="text-align:center;">
            <div style="font-size:40px;">🇺🇿</div>
            <div style="font-size:10px; font-weight:bold; color:#1b5e20;">SARIOSIYO</div>
        </div>
        <div style="text-align:center; flex-grow:1; margin:0 15px;">
            <h2 style="color:#2c3e50; margin:0; font-size:18px; line-height:1.2;">SARIOSIYO TUMANI MAKTABLAR MASOFA TIZIMI</h2>
            <div style="font-size:12px; color:#555; margin-top:3px;">O'zbekiston Respublikasi</div>
        </div>
        <div style="text-align:center;">
            <div style="font-size:40px;">🏫</div>
            <div style="font-size:10px; font-weight:bold; color:#e65100;">94 MAKTAB</div>
        </div>
    </div>

    <div style="background-color:#fff9c4; padding:20px; text-align:center; border-bottom:1px solid #fff59d; position:relative;">
        <div style="font-size:80px; filter:grayscale(30%);">🏢</div>
        <div style="font-size:12px; color:#444; margin-top:8px;">Boshqaruv Paneli</div>
        <div style="position:absolute; bottom:10px; right:15px; font-size:24px; color:#3498db; opacity:0.7;">📍</div>
        <div style="position:absolute; top:15px; left:15px; font-size:16px; color:#e67e22; opacity:0.7;">🗺️</div>
    </div>

    <div style="padding:25px;">
        <div style="margin-bottom:20px;">
            <label style="font-weight:700; color:#34495e; display:block; margin-bottom:10px; font-size:16px;">Tuman xaritasidan maktabni tanlang:</label>
            <select id="schoolSelect" onchange="calculateDistances()" style="width:100%; padding:14px; border:2px solid #4db6ac; border-radius:10px; font-size:16px; color:#2c3e50; background-color:#fff; cursor:pointer; outline:none; transition:border-color 0.3s; box-sizing:border-box;">
                <option value="">-- Ro'yxatdan tanlang (94 ta maktab) --</option>
            </select>
        </div>

        <div id="resultBox" style="display:none; margin-top:30px; border-top:1px solid #eee; padding-top:20px;">
            <div id="selectedTitle" style="font-size:18px; font-weight:bold; color:#00796b; margin-bottom:20px; background:#e0f2f1; padding:12px; border-radius:8px; border-left:5px solid #00796b;"></div>
            <div id="nearestList"></div>
        </div>
    </div>

    <div style="background:#eceff1; padding:10px; text-align:center; font-size:11px; color:#777; border-top:1px solid #cfd8dc;">
        © Sariosiyo Tumani Xalq Ta'limi Bo'limi | Masofa Tizimi v2.0
    </div>
</div>

<script>
    // 94 ta maktab bazasi (namuna)
    const schools = [
        { id: 1, name: "1-sonli maktab", region: "Markaz", lat: 38.042, lng: 67.928 },
        { id: 2, name: "2-sonli maktab", region: "Tojiqishloq", lat: 38.045, lng: 67.930 },
        { id: 3, name: "3-sonli maktab", region: "Sangardak", lat: 38.210, lng: 67.850 },
        { id: 19, name: "19-sonli maktab", region: "Dashnobod", lat: 38.124, lng: 67.895 },
        { id: 34, name: "34-sonli maktab", region: "Dashnobod", lat: 38.131, lng: 67.899 },
        { id: 54, name: "54-sonli maktab", region: "Dashnobod", lat: 38.118, lng: 67.882 }
    ];

    // Select menyuni to'ldirish
    const select = document.getElementById('schoolSelect');
    schools.forEach(school => {
        let opt = document.createElement('option');
        opt.value = school.id;
        opt.innerHTML = `${school.id}-maktab (${school.region})`;
        select.appendChild(opt);
    });

    // Haversine formulasi (masofani hisoblash)
    function getDistance(lat1, lon1, lat2, lon2) {
        if (lat1 === 0 || lat2 === 0) return null;
        const R = 6371; // km
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    // Natijalarni hisoblash
    function calculateDistances() {
        const selectValue = document.getElementById('schoolSelect').value;
        const resultBox = document.getElementById('resultBox');
        const selectedTitle = document.getElementById('selectedTitle');
        const nearestList = document.getElementById('nearestList');

        if (!selectValue) {
            resultBox.style.display = 'none';
            return;
        }

        const selectedSchool = schools.find(s => s.id == selectValue);
        selectedTitle.innerHTML = `📍 ${selectedSchool.name} (${selectedSchool.region})`;

        // Boshqa maktablargacha bo'lgan masofani hisoblash va saralash
        let calculated = schools
            .filter(s => s.id !== selectedSchool.id && s.lat !== 0)
            .map(s => {
                let dist = getDistance(selectedSchool.lat, selectedSchool.lng, s.lat, s.lng);
                return { ...s, distance: dist };
            })
            .sort((a, b) => a.distance - b.distance);

        // Natijalarni ekranga chiqarish
        nearestList.innerHTML = '';
        if(calculated.length === 0) {
            nearestList.innerHTML = '<div style="font-size:14px; color:#7f8c8d; font-style:italic; padding:15px; text-align:center;">Yaqin maktablar topilmadi.</div>';
        } else {
            calculated.forEach(s => {
                let distanceStr = s.distance < 1 
                    ? `${(s.distance * 1000).toFixed(0)} metr` 
                    : `${s.distance.toFixed(2)} km`;

                nearestList.innerHTML += `
                    <div style="background:#f9f9f9; border:1px solid #e0e0e0; padding:15px; margin-bottom:12px; border-radius:10px;
