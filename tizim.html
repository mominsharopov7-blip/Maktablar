    });

    // Masofani hisoblash formulasi
    function getDistance(lat1, lon1, lat2, lon2) {
        if (lat1 === 0 || lat2 === 0 || lon1 === 0 || lon2 === 0) return null;
        const R = 6371; // km
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    // Tanlanganda masofalarni chiqarish
    function calculateDistances() {
        const selectValue = document.getElementById('schoolSelect').value;
        const resultBox = document.getElementById('resultBox');
        const selectedTitle = document.getElementById('selectedTitle');
        const nearestList = document.getElementById('nearestList');

        if (!selectValue) {
            resultBox.style.display = 'none';
            return;
        }

        const selectedSchool = schools.find(s => s.id == selectValue);
        selectedTitle.innerHTML = `📍 Tanlangan bosh maktab: ${selectedSchool.name} (${selectedSchool.region})`;

        if (selectedSchool.lat === 0 || selectedSchool.lng === 0) {
            nearestList.innerHTML = '<div style="font-size:13px; color:#ef4444; font-style:italic; padding:15px; text-align:center; font-weight:500;">Ushbu maktabning GPS koordinatalari tizimga hali kiritilmagan. Shuning uchun masofani hisoblab bo\'lmaydi.</div>';
            resultBox.style.display = 'block';
            return;
        }

        // Boshqa maktablargacha bo'lgan masofani hisoblash
        let calculated = schools
            .filter(s => s.id !== selectedSchool.id && s.lat !== 0 && s.lng !== 0)
            .map(s => {
                let dist = getDistance(selectedSchool.lat, selectedSchool.lng, s.lat, s.lng);
                return { ...s, distance: dist };
            })
            .sort((a, b) => a.distance - b.distance);

        nearestList.innerHTML = '';

        if (calculated.length === 0) {
            nearestList.innerHTML = '<div style="font-size:13px; color:#7f8c8d; font-style:italic; padding:15px; text-align:center;">Tizimda solishtirish uchun boshqa koordinatali maktablar topilmadi.</div>';
        } else {
            calculated.forEach(s => {
                let distanceStr = s.distance < 1 
                    ? `${(s.distance * 1000).toFixed(0)} metr` 
                    : `${s.distance.toFixed(2)} km`;

                nearestList.innerHTML += `
                    <div style="background:#f9f9f9; border:1px solid #e0e0e0; padding:12px 15px; margin-bottom:10px; border-radius:10px; display:flex; justify-content:space-between; align-items:center; border-left:4px solid #00acc1;">
                        <div>
                            <b style="color:#2c3e50; display:block; font-size:14px;">🏫 ${s.name}</b>
                            <span style="font-size:12px; color:#7f8c8d;">Hudud: ${s.region}</span>
                        </div>
                        <div style="background:#00acc1; color:white; padding:6px 12px; border-radius:20px; font-size:12px; font-weight:700; white-space:nowrap; box-shadow:0 2px 5px rgba(0,0,0,0.1);">${distanceStr}</div>
                    </div>
                `;
            });
        }
        resultBox.style.display = 'block';
    }
